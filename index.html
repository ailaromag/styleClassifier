<!DOCTYPE html>
<html lang="ca">

<head>
    <meta charset="UTF-8">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Raleway:wght@300;400&display=swap"
        rel="stylesheet">
    <title>Classificador d'Estils</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.18.0/dist/tf.min.js"></script>
    <script
        src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8.5/dist/teachablemachine-image.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/face_detection.js"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
</head>

<body>
    <header class="header">
        <h1>
            <span class="line1">classify</span>
            <span class="line2">your <span class="style-text">STYLE</span></span>
        </h1>
    </header>
    <div id="controls">
        <label for="image-input" id="upload-btn">Pujar imatge</label>
        <button id="webcam-btn">Activar Webcam</button>
        <input type="file" id="image-input" accept="image/*">
        <div id="mode-toggle">
            <label class="switch">
                <input type="checkbox" id="mode-switch">
                <span class="slider"></span>
            </label>
            <span id="mode-label">Mode Kids</span>
        </div>
    </div>

    <div id="container">
        <div id="display">
            <video id="webcam" autoplay playsinline></video>
            <img id="uploaded-image">
            <img id="overlay">
            <div id="flash"></div>
            <button id="capture-btn"></button>
            <button id="reset-btn">Reset</button>
        </div>

        <div id="result">
            <div id="loading">Classificant el teu estil...</div>
            <h2>Resultat:</h2>
            <p id="predicted-class">-</p>
            <p id="confidence">-</p>
        </div>

        <div id="probabilities">
            <h3>Probabilitats:</h3>
            <div class="prob-bar"><span id="label-oldmoney">Old Money:</span> <progress id="prob-oldmoney" value="0" max="100"></progress>
                <span id="val-oldmoney">0%</span>
            </div>
            <div class="prob-bar"><span id="label-streetwear">Streetwear:</span> <progress id="prob-streetwear" value="0"
                    max="100"></progress> <span id="val-streetwear">0%</span></div>
            <div class="prob-bar"><span id = "label-cottagecore">CottageCore:</span> <progress id="prob-cottagecore" value="0"
                    max="100"></progress> <span id="label-cottagecore">0%</span></div>
            <div class="prob-bar"><span id ="label-rockstar">Rockstar:</span> <progress id="prob-rockstar" value="0" max="100"></progress>
                <span id="val-rockstar">0%</span>
            </div>
        </div>

    </div>
    <script src="script.js"></script>
    <script src="config.js"></script>

</body>

</html>
